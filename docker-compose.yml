services:
  web:
    build: .
    container_name: ledgerflow-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - db_data:/app/db
      - app_data:/app/data
      - static_files:/app/staticfiles
    environment:
      - DEBUG=False
      - DB_PATH=/app/db/db.sqlite3

volumes:
  db_data:
  app_data:
  static_files:
