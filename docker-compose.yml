services:
  web:
    build: .
    container_name: ledgerflow-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/db
      - app_data:/app/data
      - static_files:/app/staticfiles
    environment:
      - DEBUG=False
      - DB_PATH=/app/db/db.sqlite3

  nginx:
    image: nginx:alpine
    container_name: ledgerflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  db_data:
  app_data:
  static_files:
